<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Problem Archive</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:         #f9f9f9;
      --surface:    #ffffff;
      --border:     #e5e5e5;
      --border-sub: #f0f0f0;
      --border-row: #f5f5f5;
      --text:       #1a1a1a;
      --text-muted: #666;
      --text-dim:   #aaa;
      --tag-bg:     #f3f3f3;
      --year-bg:    #fafafa;
      --input-bg:   #ffffff;
      --sol-text:   #2d7a4f;
      --sol-border: #a8d5b8;
      --sol-hover:  #f0faf4;
      --highlight:  #fef3c7;
    }
    [data-theme="dark"] {
      --bg:         #111214;
      --surface:    #1a1c20;
      --border:     #2a2d34;
      --border-sub: #222428;
      --border-row: #1e2026;
      --text:       #e8e8e8;
      --text-muted: #999;
      --text-dim:   #555;
      --tag-bg:     #252830;
      --year-bg:    #161820;
      --input-bg:   #1e2026;
      --sol-text:   #4caf82;
      --sol-border: #2d5c3f;
      --sol-hover:  #1a2e22;
      --highlight:  #3d3310;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background .2s, color .2s;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 28px 40px 0;
      position: sticky;
      top: 0;
      z-index: 10;
      transition: background .2s, border-color .2s;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .header-top h1 { font-size: 1.25rem; font-weight: 600; }
    .header-top p  { font-size: .8rem; color: var(--text-muted); margin-top: 3px; }

    /* Dark toggle */
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      font-size: .78rem;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .toggle-track {
      width: 36px; height: 20px;
      background: #d0d0d0;
      border-radius: 10px;
      position: relative;
      transition: background .2s;
    }
    [data-theme="dark"] .toggle-track { background: #4a7c5f; }
    .toggle-knob {
      position: absolute;
      top: 3px; left: 3px;
      width: 14px; height: 14px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
      box-shadow: 0 1px 3px rgba(0,0,0,.25);
    }
    [data-theme="dark"] .toggle-knob { transform: translateX(16px); }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 10px;
      padding-bottom: 16px;
      flex-wrap: wrap;
    }
    .search-wrap { position: relative; flex: 1; min-width: 180px; }
    .search-wrap svg {
      position: absolute; left: 11px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim); pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: 8px 12px 8px 34px;
      font-family: 'Inter', sans-serif;
      font-size: .82rem;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 7px;
      outline: none;
      transition: border-color .15s, background .2s, color .2s;
    }
    .search-input::placeholder { color: var(--text-dim); }
    .search-input:focus { border-color: #888; }

    .filters { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .filter-pill {
      font-family: 'Inter', sans-serif;
      font-size: .75rem; font-weight: 500;
      padding: 6px 13px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .filter-pill:hover { border-color: #888; color: var(--text); }
    .filter-pill.active { background: var(--text); color: var(--surface); border-color: var(--text); }

    /* ── MAIN ── */
    main {
      max-width: 780px;
      margin: 32px auto;
      padding: 0 24px 80px;
    }

    .state-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 40px;
      text-align: center;
      color: var(--text-dim);
      font-size: .85rem;
    }
    .spinner {
      width: 22px; height: 22px;
      border: 2px solid var(--border);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Competition */
    .competition {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 20px;
      overflow: hidden;
      transition: background .2s, border-color .2s;
    }
    .competition-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .competition-header h2 { font-size: .92rem; font-weight: 600; }
    .comp-slug {
      font-size: .72rem; color: var(--text-dim);
      background: var(--tag-bg); padding: 2px 8px; border-radius: 20px;
      font-family: monospace;
    }
    .comp-count { margin-left: auto; font-size: .72rem; color: var(--text-dim); }

    /* Year */
    .year-group { border-bottom: 1px solid var(--border-sub); }
    .year-group:last-child { border-bottom: none; }
    .year-label {
      padding: 9px 20px;
      font-size: .7rem; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--text-dim); background: var(--year-bg);
      border-bottom: 1px solid var(--border-sub);
    }

    /* Problem row */
    .problem-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border-row);
      gap: 12px;
    }
    .problem-row:last-child { border-bottom: none; }

    .problem-name   { font-size: .875rem; font-weight: 500; }
    .problem-folder { font-size: .73rem; color: var(--text-dim); margin-top: 2px; font-family: monospace; }

    mark {
      background: var(--highlight);
      color: inherit;
      border-radius: 2px;
      padding: 0 1px;
    }

    .row-actions {
      display: flex;
      gap: 7px;
      flex-shrink: 0;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    /* Buttons */
    .btn {
      font-family: 'Inter', sans-serif;
      font-size: .75rem; font-weight: 500;
      padding: 5px 12px;
      border-radius: 6px; border: 1px solid;
      cursor: pointer; text-decoration: none;
      transition: background .15s, color .15s, border-color .15s;
      white-space: nowrap;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .btn-browse   { background: var(--surface); color: var(--text-muted); border-color: var(--border); }
    .btn-browse:hover { border-color: #888; color: var(--text); }
    .btn-problem  { background: var(--text); color: var(--surface); border-color: var(--text); }
    .btn-problem:hover { opacity: .82; }
    .btn-solution { background: var(--surface); color: var(--sol-text); border-color: var(--sol-border); }
    .btn-solution:hover { background: var(--sol-hover); }

    .empty-note { padding: 14px 20px; font-size: .8rem; color: var(--text-dim); font-style: italic; }
    .no-results  { text-align: center; padding: 48px 20px; color: var(--text-dim); font-size: .85rem; }

    footer {
      text-align: center;
      font-size: .75rem; color: var(--text-dim); padding-bottom: 40px;
    }
    footer a { color: var(--text-dim); text-decoration: underline; text-underline-offset: 3px; }
    footer a:hover { color: var(--text-muted); }

    @media (max-width: 560px) {
      header { padding: 20px 16px 0; }
      main { padding: 0 12px 60px; margin-top: 20px; }
      .problem-row { flex-direction: column; align-items: flex-start; }
      .row-actions { width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <h1>Problem Archive</h1>
      <p>Browse and download olympiad problem sets by competition and year.</p>
    </div>
    <div class="theme-toggle" id="themeToggle" title="Toggle dark mode">
      <span id="themeLabel">Light</span>
      <div class="toggle-track"><div class="toggle-knob"></div></div>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="search-input" id="search" type="text" placeholder="Search problems…" autocomplete="off" />
    </div>
    <div class="filters" id="filters">
      <button class="filter-pill active" data-filter="all">All</button>
      <button class="filter-pill" data-filter="solution">Has Solution</button>
    </div>
  </div>
</header>

<main id="archive">
  <div class="state-box"><div class="spinner"></div>Loading archive…</div>
</main>

<footer>
  Downloads via <a href="https://download-directory.github.io" target="_blank" rel="noopener">download-directory.github.io</a>
</footer>

<script>
  // ── CONFIG ───────────────────────────────────────────────
  const GITHUB_USER = "YunnoKon";
  const GITHUB_REPO = "oai-list";
  const BRANCH      = "main";
  // ─────────────────────────────────────────────────────────

  const ghView = p => `https://github.com/${GITHUB_USER}/${GITHUB_REPO}/tree/${BRANCH}/${p}`;
  const ghDl   = p => `https://download-directory.github.io/?url=https://github.com/${GITHUB_USER}/${GITHUB_REPO}/tree/${BRANCH}/${p}`;

  let archiveData  = [];
  let activeFilter = "all";
  let searchQuery  = "";

  const iconDl = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v13M7 11l5 5 5-5"/><path d="M3 21h18"/></svg>`;

  function highlight(text, q) {
    if (!q) return text;
    const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    return text.replace(re, '<mark>$1</mark>');
  }

  function isVisible(p, yg) {
    const q  = searchQuery.toLowerCase();
    const nm = !q || p.name.toLowerCase().includes(q) || p.pretty.toLowerCase().includes(q);
    const fm = activeFilter === "all"
      || (activeFilter === "solution" && p.solPath)
      || activeFilter === yg.year;
    return nm && fm;
  }

  function renderArchive() {
    const root  = document.getElementById('archive');
    const q     = searchQuery.toLowerCase();
    let total   = 0;

    const html = archiveData.map(comp => {
      const visProbs = comp.years.flatMap(yg => yg.problems.filter(p => isVisible(p, yg)));
      if (visProbs.length === 0) return '';
      total += visProbs.length;

      const yearsHtml = comp.years.map(yg => {
        const rows = yg.problems.filter(p => isVisible(p, yg));
        if (rows.length === 0) return '';

        const rowsHtml = rows.map(p => `
          <div class="problem-row">
            <div>
              <div class="problem-name">${highlight(p.pretty, q)}</div>
              <div class="problem-folder">${highlight(p.name, q)}</div>
            </div>
            <div class="row-actions">
              <a class="btn btn-browse"  href="${ghView(p.probPath)}" target="_blank" rel="noopener">Browse</a>
              <a class="btn btn-problem" href="${ghDl(p.probPath)}"   target="_blank" rel="noopener">${iconDl} Problem</a>
              ${p.solPath
                ? `<a class="btn btn-solution" href="${ghDl(p.solPath)}" target="_blank" rel="noopener">${iconDl} Solution</a>`
                : ''}
            </div>
          </div>`).join('');

        return `
          <div class="year-group">
            <div class="year-label">${yg.year}</div>
            ${rowsHtml}
          </div>`;
      }).join('');

      return `
        <div class="competition">
          <div class="competition-header">
            <h2>${comp.name}</h2>
            <span class="comp-slug">${comp.slug}</span>
            <span class="comp-count">${visProbs.length} problem${visProbs.length !== 1 ? 's' : ''}</span>
          </div>
          ${yearsHtml}
        </div>`;
    }).join('');

    root.innerHTML = total === 0
      ? `<div class="no-results">No problems match your search or filter.</div>`
      : html;
  }

  function injectYearFilters() {
    const years = [...new Set(
      archiveData.flatMap(c => c.years.map(y => y.year))
    )].sort((a, b) => b - a);

    const fil = document.getElementById('filters');
    years.forEach(yr => {
      const b = document.createElement('button');
      b.className = 'filter-pill';
      b.dataset.filter = yr;
      b.textContent = yr;
      fil.appendChild(b);
    });
  }

  // Events
  document.getElementById('filters').addEventListener('click', e => {
    const p = e.target.closest('.filter-pill');
    if (!p) return;
    document.querySelectorAll('.filter-pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    activeFilter = p.dataset.filter;
    renderArchive();
  });

  document.getElementById('search').addEventListener('input', e => {
    searchQuery = e.target.value;
    renderArchive();
  });

  // Dark mode
  const htmlEl = document.documentElement;
  const saved  = localStorage.getItem('theme') || 'light';
  htmlEl.dataset.theme = saved;
  document.getElementById('themeLabel').textContent = saved === 'dark' ? 'Dark' : 'Light';

  document.getElementById('themeToggle').addEventListener('click', () => {
    const next = htmlEl.dataset.theme === 'dark' ? 'light' : 'dark';
    htmlEl.dataset.theme = next;
    document.getElementById('themeLabel').textContent = next === 'dark' ? 'Dark' : 'Light';
    localStorage.setItem('theme', next);
  });

  // Boot — load static archive.json
  async function init() {
    const root = document.getElementById('archive');
    try {
      const res = await fetch('./archive.json');
      if (!res.ok) throw new Error(`Could not load archive.json (${res.status}). Did you run: node build.js ?`);
      archiveData = await res.json();
      injectYearFilters();
      renderArchive();
    } catch (err) {
      root.innerHTML = `
        <div class="state-box">
          ⚠️ ${err.message}
        </div>`;
    }
  }

  init();
</script>
</body>
</html>
